name: inception

services:
  mariadb:
    image: inception-mariadb:1.0
    build: ./requirements/mariadb
    env_file: .env
    secrets:
      - db_root_password
      - db_password
    networks:
      - inception
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: on-failure

  wordpress:
    image: inception-wordpress:1.0
    build: ./requirements/wordpress
    env_file: .env
    secrets:
      - credentials
      - db_password
      - wp_user2_password
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      - mariadb
    restart: on-failure

  nginx:
    image: inception-nginx:1.0
    build: ./requirements/nginx
    env_file: .env
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      - wordpress
    restart: on-failure
    ports:
      - 443:443

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/anogueir/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/anogueir/data/wordpress

networks:
  inception:
    driver: bridge

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  
  db_password:
    file: ../secrets/db_password.txt
  
  credentials:
    file: ../secrets/credentials.txt
  
  wp_user2_password:
    file: ../secrets/wp_user2_password.txt